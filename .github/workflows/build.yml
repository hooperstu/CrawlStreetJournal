name: Build desktop apps

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: macos
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller collector.spec --noconfirm

      # ── macOS: zip the .app bundle ────────────────────────────────
      - name: Package macOS app
        if: runner.os == 'macOS'
        working-directory: dist
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "The Crawl Street Journal.app" \
            "The-Crawl-Street-Journal-macOS.zip"

      - name: Upload macOS artefact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: The-Crawl-Street-Journal-macOS
          path: dist/The-Crawl-Street-Journal-macOS.zip

      # ── Windows: zip the folder ───────────────────────────────────
      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: dist
        run: |
          Compress-Archive `
            -Path "The Crawl Street Journal" `
            -DestinationPath "The-Crawl-Street-Journal-Windows.zip"

      - name: Upload Windows artefact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: The-Crawl-Street-Journal-Windows
          path: dist/The-Crawl-Street-Journal-Windows.zip

      # ── Linux: tar the folder ─────────────────────────────────────
      - name: Package Linux app
        if: runner.os == 'Linux'
        working-directory: dist
        run: |
          tar -czf "The-Crawl-Street-Journal-Linux.tar.gz" \
            "The Crawl Street Journal"

      - name: Upload Linux artefact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: The-Crawl-Street-Journal-Linux
          path: dist/The-Crawl-Street-Journal-Linux.tar.gz

  # ── Attach artefacts to GitHub Release when triggered by a tag ────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: artefacts/*
