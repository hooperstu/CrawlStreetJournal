{% extends "base.html" %}
{% block title %}Sign in — The Crawl Street Journal{% endblock %}
{% block content %}
<div class="card" style="max-width:420px;margin:48px auto;padding:28px;">
  <h1 class="page-title" style="margin-bottom:16px;">Sign in</h1>
  <p class="text-muted" style="margin-bottom:20px;">This installation requires a password.</p>
  {% if error %}
  <p style="color:var(--csj-error);margin-bottom:16px;font-weight:600;">{{ error }}</p>
  {% endif %}
  <form method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <label for="password" style="display:block;margin-bottom:8px;font-weight:600;">Password</label>
    <input type="password" id="password" name="password" required autocomplete="current-password"
           style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:16px;margin-bottom:20px;">
    <button type="submit" class="btn btn-primary">Sign in</button>
  </form>
</div>
{% endblock %}
